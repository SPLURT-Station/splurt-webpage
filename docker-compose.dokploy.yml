# Dokploy: Docker Compose — image built from this repo on each deploy.
# Docs: https://docs.dokploy.com/docs/core/docker-compose
#
# Traffic: point nginx (outside Dokploy) at the published host port, e.g.
#   proxy_pass http://127.0.0.1:4321;
#
# Environment:
# - Dokploy “Environment” UI writes a .env next to this file, or create `.env` on the server.
# - `build.args` feeds Vite/Astro `import.meta.env.*` at image build time.
# - With Auto Deploy, prefer Dokploy env UI or a File Mount + env_file (see README).
#
# PUBLISH_PORT — host port nginx connects to (default 4321).
# PORT — port the app listens on inside the container (default 4321; keep both in sync unless you map explicitly).

services:
  splurt-webpage:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-}
        PUBLIC_MEDIA_SPLASH_SOURCE_TYPE: ${PUBLIC_MEDIA_SPLASH_SOURCE_TYPE:-}
        PUBLIC_MEDIA_SPLASH_BASE_URL: ${PUBLIC_MEDIA_SPLASH_BASE_URL:-}
        MEDIA_SPLASH_LOCAL_FOLDER_PATH: ${MEDIA_SPLASH_LOCAL_FOLDER_PATH:-}
        PUBLIC_MEDIA_SPLASH_PATTERNS: ${PUBLIC_MEDIA_SPLASH_PATTERNS:-}
        PUBLIC_MEDIA_SCREENSHOT_SOURCE_TYPE: ${PUBLIC_MEDIA_SCREENSHOT_SOURCE_TYPE:-}
        PUBLIC_MEDIA_SCREENSHOT_BASE_URL: ${PUBLIC_MEDIA_SCREENSHOT_BASE_URL:-}
        MEDIA_SCREENSHOT_LOCAL_FOLDER_PATH: ${MEDIA_SCREENSHOT_LOCAL_FOLDER_PATH:-}
        PUBLIC_MEDIA_SCREENSHOT_PATTERNS: ${PUBLIC_MEDIA_SCREENSHOT_PATTERNS:-}
        PUBLIC_MEDIA_SOURCE_TYPE: ${PUBLIC_MEDIA_SOURCE_TYPE:-}
        PUBLIC_MEDIA_BASE_URL: ${PUBLIC_MEDIA_BASE_URL:-}
        MEDIA_LOCAL_FOLDER_PATH: ${MEDIA_LOCAL_FOLDER_PATH:-}
        PUBLIC_MEDIA_MAX_IMAGES_PER_CATEGORY: ${PUBLIC_MEDIA_MAX_IMAGES_PER_CATEGORY:-}
        MEDIA_CACHE_DURATION: ${MEDIA_CACHE_DURATION:-}
        PUBLIC_YOUTUBE_PLAYLIST_ID: ${PUBLIC_YOUTUBE_PLAYLIST_ID:-}
        PUBLIC_YOUTUBE_PLAYLIST_URL: ${PUBLIC_YOUTUBE_PLAYLIST_URL:-}
        PUBLIC_YOUTUBE_API_KEY: ${PUBLIC_YOUTUBE_API_KEY:-}
        PUBLIC_YOUTUBE_DEFAULT_SONG_INDEX: ${PUBLIC_YOUTUBE_DEFAULT_SONG_INDEX:-}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PUBLIC_MEDIA_SPLASH_SOURCE_TYPE: ${PUBLIC_MEDIA_SPLASH_SOURCE_TYPE}
      PUBLIC_MEDIA_SPLASH_BASE_URL: ${PUBLIC_MEDIA_SPLASH_BASE_URL}
      MEDIA_SPLASH_LOCAL_FOLDER_PATH: ${MEDIA_SPLASH_LOCAL_FOLDER_PATH}
      PUBLIC_MEDIA_SPLASH_PATTERNS: ${PUBLIC_MEDIA_SPLASH_PATTERNS}
      PUBLIC_MEDIA_SCREENSHOT_SOURCE_TYPE: ${PUBLIC_MEDIA_SCREENSHOT_SOURCE_TYPE}
      PUBLIC_MEDIA_SCREENSHOT_BASE_URL: ${PUBLIC_MEDIA_SCREENSHOT_BASE_URL}
      MEDIA_SCREENSHOT_LOCAL_FOLDER_PATH: ${MEDIA_SCREENSHOT_LOCAL_FOLDER_PATH}
      PUBLIC_MEDIA_SCREENSHOT_PATTERNS: ${PUBLIC_MEDIA_SCREENSHOT_PATTERNS}
      PUBLIC_MEDIA_SOURCE_TYPE: ${PUBLIC_MEDIA_SOURCE_TYPE}
      PUBLIC_MEDIA_BASE_URL: ${PUBLIC_MEDIA_BASE_URL}
      MEDIA_LOCAL_FOLDER_PATH: ${MEDIA_LOCAL_FOLDER_PATH}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
      PUBLIC_MEDIA_MAX_IMAGES_PER_CATEGORY: ${PUBLIC_MEDIA_MAX_IMAGES_PER_CATEGORY}
      MEDIA_CACHE_DURATION: ${MEDIA_CACHE_DURATION}
      PUBLIC_YOUTUBE_PLAYLIST_ID: ${PUBLIC_YOUTUBE_PLAYLIST_ID}
      PUBLIC_YOUTUBE_PLAYLIST_URL: ${PUBLIC_YOUTUBE_PLAYLIST_URL}
      PUBLIC_YOUTUBE_API_KEY: ${PUBLIC_YOUTUBE_API_KEY}
      PUBLIC_YOUTUBE_DEFAULT_SONG_INDEX: ${PUBLIC_YOUTUBE_DEFAULT_SONG_INDEX}
    ports:
      - "${PUBLISH_PORT:-4321}:${PORT:-4321}"
